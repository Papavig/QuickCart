<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../CSS/style.css" />

    <title>QuickCart - REGISTER</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light bg-light fixed-top bg-opacity-75"
    >
      <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand" href="../../index.html"
          ><img
            src="../Images/bag.svg"
            alt="icon"
            class="px-2 pb-1"
          />QuickCart</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="../../index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="shop.html">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="signin.html">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="row border p-3 bg-white shadow">
        <div class="col-md-6 d-flex justify-content-center align-items-center flex-column left-box">
          <div class="featured-image mb-3">
            <img src="../Images/signin.jpg" class="img-fluid" />
          </div>
        </div>
    
        <div class="col-md-6">
          <div class="row align-items-center">
            <form class="row g-3">
              <div class="col-md-6">
                <input
                  type="text"
                  class="form-control form-control-lg login-form"
                  placeholder="First name"
                  required
                />
              </div>
              <div class="col-md-6">
                <input
                  type="text"
                  class="form-control form-control-lg login-form"
                  placeholder="Last name"
                  required
                />
              </div>
              <div class="col-12">
                <input
                  type="email"
                  class="form-control form-control-lg login-form"
                  placeholder="Email address"
                  required
                />
              </div>
              <div class="col-md-6">
                <input
                  type="password"
                  class="form-control form-control-lg login-form"
                  placeholder="Password"
                  required
                  pattern=".{8,}" 
                  title="Password must be at least 8 characters"
                />
              </div>
              <div class="col-md-6">
                <input
                  type="password"
                  class="form-control form-control-lg login-form"
                  placeholder="Confirm Password"
                  required
                  pattern=".{8,}" 
                  title="Password must be at least 8 characters"
                />
              </div>
              <div class="col-12">
                <input
                  type="text"
                  class="form-control form-control-lg login-form"
                  placeholder="Address 1"
                  required
                />
              </div>
              <div class="col-12 mb-3">
                <input
                  type="text"
                  class="form-control form-control-lg login-form"
                  placeholder="Address 2"
                />
              </div>
              <div class="input-group mb-3">
                <button type="submit" class="btn btn-dark login-btn">Sign Up</button>
              </div>
              <div class="row">
                <p>Already have an account? <a href="signin.html">Login</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
